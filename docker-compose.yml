services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-plos}
      POSTGRES_USER: ${POSTGRES_USER:-plos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-plos_local_dev}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  backend:
    build:
      context: ./apps/backend
    environment:
      APP_NAME: ${APP_NAME:-Personal Learning OS API}
      APP_VERSION: ${APP_VERSION:-0.1.0}
      APP_ENVIRONMENT: ${APP_ENVIRONMENT:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-plos}:${POSTGRES_PASSWORD:-plos_local_dev}@postgres:5432/${POSTGRES_DB:-plos}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:3000}
      LOCAL_USER_ID: ${LOCAL_USER_ID:-00000000-0000-4000-8000-000000000001}
      LOCAL_USER_EMAIL: ${LOCAL_USER_EMAIL:-local@personal-learning-os.test}
      LOCAL_USER_DISPLAY_NAME: ${LOCAL_USER_DISPLAY_NAME:-Local User}
      LOCAL_USER_TIMEZONE: ${LOCAL_USER_TIMEZONE:-Europe/Moscow}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/ready', timeout=2)",
        ]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  frontend:
    build:
      context: ./apps/frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    environment:
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/today >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
